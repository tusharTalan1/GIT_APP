<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Profile Explorer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="app-header">
    <h1>GitHub Profile Explorer</h1>
    <p class="tagline">Search any GitHub user and explore their repos</p>
  </header>

  <main id="app">
    <section class="search-section">
    <input
      type="text"
      id="username-input"
      placeholder="Enter a GitHub username..."
      autocomplete="off"
    >
    <button id="search-btn">Search</button>
  </section>

  <p id="error-message" class="error hide"></p>
<p id="loading-message" class="loading hide">Loading...</p>

    <section id="profile-card" class="profile-card hide">
      <img id="profile-avatar" class="avatar" src="" alt="avatar">
      <div class="profile-info">
        <h2 id="profile-name"></h2>
        <p id="profile-username" class="username"></p>
        <p id="profile-bio" class="bio"></p>
        <div class="profile-stats">
          <span><strong id="profile-followers"></strong> Followers</span>
          <span><strong id="profile-following"></strong> Following</span>
          <span><strong id="profile-repos"></strong> Repos</span>
        </div>
        <p id="profile-location" class="location"></p>
      </div>
    </section>
    <section id="repo-controls" class="repo-controls hide">
      <label for="sort-select">Sort by:</label>
      <select id="sort-select">
        <option value="stars">Stars</option>
        <option value="updated">Last Updated</option>
      </select>
    </section>

    <section id="repo-list" class="repo-list"></section>

    <button id="load-more-btn" class="load-more hide">Load more</button>
  </main>
  </main>

  <div id="repo-modal" class="modal hide">
    <div class="modal-content">
      <button id="modal-close" class="modal-close">&times;</button>
      <h2 id="modal-repo-name"></h2>
      <p id="modal-repo-description"></p>
      <div id="modal-languages" class="modal-languages"></div>
      <div class="modal-meta">
        <span id="modal-open-issues"></span>
        <span id="modal-license"></span>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
